version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: college-erp-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_in_production_123!}
      POSTGRES_DB: ${POSTGRES_DB:-college_erp}
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
